<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MOBI Raw Text Inspector</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 1100px; margin: 30px auto; background: #f0f2f5; color: #1c1e21; }
        .card { background: white; padding: 35px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); margin-bottom: 20px; }
        h2 { color: #007bff; margin-top: 0; }
        .upload-section { border: 3px dashed #007bff; background: #f8fbff; padding: 20px; text-align: center; cursor: pointer; border-radius: 12px; margin-bottom: 15px; }
        #log { background: #1c1e21; color: #a5d6a7; padding: 15px; font-family: monospace; height: 200px; overflow-y: auto; border-radius: 8px; font-size: 12px; white-space: pre-wrap; }
        .btn { background: #007bff; color: white; border: none; padding: 10px 24px; font-size: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 4px; }
        .btn:disabled { background: #6c757d; cursor: not-allowed; }
        .btn-sm { font-size: 12px; padding: 5px 12px; border-radius: 5px; }
        #controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
        #rawOutput { background: #1c1e21; color: #e8e8e8; padding: 15px; font-family: monospace; height: 420px; overflow-y: auto; border-radius: 8px; font-size: 12px; white-space: pre-wrap; border: 1px solid #30363d; }
        #renderedOutput { background: white; padding: 15px; height: 420px; overflow-y: auto; border-radius: 8px; border: 1px solid #ddd; font-size: 13px; }
        .tabs { display: flex; gap: 4px; margin-bottom: 8px; }
        .tab { padding: 6px 16px; border-radius: 6px 6px 0 0; cursor: pointer; background: #e9ecef; border: 1px solid #dee2e6; border-bottom: none; font-size: 13px; }
        .tab.active { background: white; font-weight: bold; color: #007bff; }
        .pane { display: none; }
        .pane.active { display: block; }
        label { font-size: 13px; }
        input[type=number] { width: 70px; padding: 4px 6px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px; }
        .badge { background: #28a745; color: white; border-radius: 4px; padding: 2px 7px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <h2>🔬 MOBI Raw Text Inspector</h2>
    <div class="upload-section" id="dropZone">
        <span id="fileNameDisplay">📁 Click or drag your .mobi file here</span>
        <input type="file" id="fileInput" accept=".mobi,.azw,.azw3" style="display:none">
    </div>
    <div id="controls">
        <label>Record: <input type="number" id="recFrom" value="1" min="1"> to <input type="number" id="recTo" value="5" min="1"></label>
        <button class="btn" id="decodeBtn" disabled>DECODE RECORDS</button>
        <button class="btn btn-sm" id="prevBtn" disabled>◀ Prev</button>
        <button class="btn btn-sm" id="nextBtn" disabled>Next ▶</button>
        <span id="recInfo" style="font-size:12px;color:#666;"></span>
    </div>
    <div id="log">Status: Idle. Load a .mobi file to begin.</div>
</div>

<div class="card" id="outputCard" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <b>Decoded Output <span id="bytesBadge" class="badge"></span></b>
        <button class="btn btn-sm" id="copyBtn">📋 Copy raw text</button>
    </div>
    <div class="tabs">
        <div class="tab active" data-tab="raw">Raw HTML source</div>
        <div class="tab" data-tab="rendered">Rendered HTML</div>
    </div>
    <div class="pane active" id="rawPane"><div id="rawOutput"></div></div>
    <div class="pane" id="renderedPane"><div id="renderedOutput"></div></div>
</div>

<script>
// ── Logging ──────────────────────────────────────────────────────────────────
const logEl = document.getElementById('log');
function addLog(msg) {
    logEl.textContent += `\n[${new Date().toLocaleTimeString()}] ${msg}`;
    logEl.scrollTop = logEl.scrollHeight;
}

// ── File I/O ─────────────────────────────────────────────────────────────────
let globalBuffer = null;
const fileInput = document.getElementById('fileInput');
document.getElementById('dropZone').onclick = () => fileInput.click();
fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById('fileNameDisplay').textContent = `📁 ${file.name} (${(file.size/1024/1024).toFixed(2)} MB)`;
    globalBuffer = await file.arrayBuffer();
    addLog(`File loaded: ${file.name}`);
    initConverter();
});

// ── Tab switching ─────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + 'Pane').classList.add('active');
    });
});

// ── Copy button ───────────────────────────────────────────────────────────────
document.getElementById('copyBtn').onclick = () => {
    navigator.clipboard.writeText(document.getElementById('rawOutput').textContent);
};

// ── Converter (same HUFF/CDIC logic as mobiKF8HuffConverter.html) ─────────────────────────────
class KF8Decoder {
    constructor(buffer) {
        this.buffer = buffer;
        this.raw    = new Uint8Array(buffer);
        this.dict1  = [];
        this.mincodeArr = new Array(33).fill(0);
        this.maxcodeArr = new Array(33).fill(0);
        this.dict   = [];
        this.recs   = [];
        this.huffIdx = -1;
        this.extraFlags = 1;
    }

    u32(o) { const r = this.raw; return ((r[o]<<24)|(r[o+1]<<16)|(r[o+2]<<8)|r[o+3]) >>> 0; }
    u16(o) { return ((this.raw[o]<<8)|this.raw[o+1]) >>> 0; }

    buildRecords() {
        const n = this.u16(76);
        for (let i = 0; i < n; i++) this.recs.push(this.u32(78 + i * 8));
    }

    findExtraDataFlags() {
        const recs = this.recs;
        const r0 = recs[0];
        let mobi = r0 + 16;
        if (!(this.raw[mobi]===0x4D && this.raw[mobi+1]===0x4F && this.raw[mobi+2]===0x42 && this.raw[mobi+3]===0x49))
            mobi = r0;
        const hdrLen = this.u32(mobi + 4);
        const mobiType = this.u32(mobi + 8);
        addLog(`MOBI type=${mobiType}, headerLen=0x${hdrLen.toString(16)}`);

        let flags = 0x0001;
        if (hdrLen >= 0xF4) {
            const raw = this.u16(mobi + 0xF2);
            flags = (raw <= 0x001F) ? raw : 0x0001;
            addLog(`ExtraDataFlags from header: 0x${raw.toString(16)}${raw > 0x001F ? ' (capped to 0x1)' : ''}`);
        }

        const exthOff = mobi + hdrLen;
        if (this.raw[exthOff]===0x45 && this.raw[exthOff+1]===0x58 && this.raw[exthOff+2]===0x54 && this.raw[exthOff+3]===0x48) {
            const exthLen = this.u32(exthOff + 4);
            const numRec  = this.u32(exthOff + 8);
            let pos = exthOff + 12;
            for (let i = 0; i < numRec && pos + 8 <= exthOff + exthLen; i++) {
                const tag = this.u32(pos), len = this.u32(pos + 4);
                if (tag === 535 && len === 12) {
                    const kf8Bound = this.u32(pos + 8);
                    addLog(`KF8 boundary record: ${kf8Bound}`);
                    const kf8Off = recs[kf8Bound + 1];
                    let kf8Mobi = kf8Off + 16;
                    if (!(this.raw[kf8Mobi]===0x4D && this.raw[kf8Mobi+1]===0x4F && this.raw[kf8Mobi+2]===0x42 && this.raw[kf8Mobi+3]===0x49))
                        kf8Mobi = kf8Off;
                    const kl = this.u32(kf8Mobi + 4);
                    if (kl >= 0xF4) { flags = this.u16(kf8Mobi + 0xF2); addLog(`KF8 flags override: 0x${flags.toString(16)}`); }
                }
                pos += len;
            }
        }
        this.extraFlags = flags;
        addLog(`Final ExtraDataFlags: 0x${flags.toString(16)}`);
    }

    loadHuff(hOff) {
        const off1 = this.u32(hOff + 8), off2 = this.u32(hOff + 12);
        for (let i = 0; i < 256; i++) {
            const v = this.u32(hOff + off1 + i * 4);
            const codelen = v & 0x1F, term = !!(v & 0x80), mxraw = (v >>> 8) >>> 0;
            const maxcode = Number((BigInt(mxraw + 1) << BigInt(32 - codelen)) - 1n) >>> 0;
            this.dict1.push({ codelen, term, maxcode });
        }
        for (let i = 1; i <= 32; i++) {
            const rawMin = this.u32(hOff + off2 + (i-1)*8);
            const rawMax = this.u32(hOff + off2 + (i-1)*8 + 4);
            const shift = 32 - i;
            this.mincodeArr[i] = Number(BigInt(rawMin) << BigInt(shift)) >>> 0;
            this.maxcodeArr[i] = Number((BigInt(rawMax + 1) << BigInt(shift)) - 1n) >>> 0;
        }
        addLog(`HUFF loaded. off1=0x${off1.toString(16)} off2=0x${off2.toString(16)}`);
    }

    loadCdic(rOff) {
        const phrases = this.u32(rOff + 8), bits = this.u32(rOff + 12);
        const n = Math.min(1 << bits, phrases - this.dict.length);
        for (let j = 0; j < n; j++) {
            const off  = this.u16(rOff + 16 + j * 2);
            const blen = this.u16(rOff + 16 + off);
            const flag = !!(blen & 0x8000), slen = blen & 0x7FFF;
            const slice = this.raw.slice(rOff + 18 + off, rOff + 18 + off + slen);
            this.dict.push({ slice, flag });
        }
    }

    decompress(data) {
        if (data.length === 0 || this.dict.length === 0) return new Uint8Array(0);
        const padded = new Uint8Array(data.length + 8);
        padded.set(data);
        const readU32 = (p) => ((padded[p]<<24)|(padded[p+1]<<16)|(padded[p+2]<<8)|padded[p+3]) >>> 0;
        let bitsleft = data.length * 8, pos = 0;
        let xhi = readU32(0), xlo = readU32(4), n = 32;
        const getCode = () => n === 32 ? xhi : (((xhi << (32 - n)) >>> 0) | (xlo >>> n)) >>> 0;
        const advance = () => { pos += 4; xhi = xlo; xlo = (pos + 4 < padded.length) ? readU32(pos + 4) : 0; n += 32; };
        const chunks = []; let outLen = 0;
        while (true) {
            if (n <= 0) advance();
            const code = getCode();
            const e = this.dict1[code >>> 24];
            let codelen = e.codelen, maxcode = e.maxcode;
            if (!e.term) { while (code < this.mincodeArr[codelen]) codelen++; maxcode = this.maxcodeArr[codelen]; }
            n -= codelen; bitsleft -= codelen;
            if (bitsleft < 0) break;
            if (n <= 0) advance();
            const r = ((maxcode - code) >>> (32 - codelen)) >>> 0;
            if (r >= this.dict.length) break;
            let entry = this.dict[r];
            if (!entry.flag) { const exp = this.decompress(entry.slice); entry = { slice: exp, flag: true }; this.dict[r] = entry; }
            chunks.push(entry.slice); outLen += entry.slice.length;
        }
        const result = new Uint8Array(outLen); let off = 0;
        for (const c of chunks) { result.set(c, off); off += c.length; }
        return result;
    }

    stripTrailing(data, flags) {
        if (!flags || data.length === 0) return data;
        let trim = 0;
        for (let j = 0; j < 15; j++) {
            if ((flags >> (j + 1)) & 1) {
                let size = 0, pos = data.length - 1 - trim, v = data[pos], shift = 7;
                size = v & 0x7F;
                while ((v & 0x80) === 0 && pos > 0) { v = data[--pos]; size |= (v & 0x7F) << shift; shift += 7; }
                trim += size;
            }
        }
        if (flags & 1) trim += (data[data.length - 1 - trim] & 3) + 1;
        return (trim > 0 && trim < data.length) ? data.slice(0, data.length - trim) : data;
    }

    init() {
        this.buildRecords();
        addLog(`PDB records: ${this.recs.length}`);
        this.findExtraDataFlags();
        for (let i = 0; i < this.recs.length; i++) {
            const o = this.recs[i];
            if (this.raw[o]===72 && this.raw[o+1]===85 && this.raw[o+2]===70 && this.raw[o+3]===70) {
                this.huffIdx = i; break;
            }
        }
        if (this.huffIdx === -1) { addLog('ERROR: No HUFF record found.'); return false; }
        addLog(`HUFF record index: ${this.huffIdx}  (text records: 1–${this.huffIdx-1})`);
        this.loadHuff(this.recs[this.huffIdx]);
        let cdic = 0;
        for (let i = this.huffIdx + 1; i < this.recs.length; i++) {
            const rOff = this.recs[i];
            const magic = String.fromCharCode(this.raw[rOff], this.raw[rOff+1], this.raw[rOff+2], this.raw[rOff+3]);
            if (magic !== 'CDIC') break;
            this.loadCdic(rOff); cdic++;
        }
        addLog(`Loaded ${cdic} CDIC records → ${this.dict.length} symbols.`);
        return true;
    }

    decodeRecord(idx) {
        const recs = this.recs;
        const start = recs[idx];
        const end   = (idx + 1 < recs.length) ? recs[idx + 1] : this.buffer.byteLength;
        let data = this.raw.slice(start, end);
        data = this.stripTrailing(data, this.extraFlags);
        const dec = this.decompress(data);
        const text = new TextDecoder('utf-8', { fatal: false }).decode(dec);
        return { text, compressedBytes: data.length, decompressedBytes: dec.length };
    }
}

// ── UI state ──────────────────────────────────────────────────────────────────
let decoder = null;

function initConverter() {
    decoder = new KF8Decoder(globalBuffer);
    const ok = decoder.init();
    if (!ok) return;
    const maxRec = decoder.huffIdx - 1;
    document.getElementById('recFrom').max = maxRec;
    document.getElementById('recTo').max   = maxRec;
    document.getElementById('recTo').value = Math.min(5, maxRec);
    document.getElementById('decodeBtn').disabled = false;
    document.getElementById('prevBtn').disabled = false;
    document.getElementById('nextBtn').disabled = false;
    addLog(`Ready. Text records: 1–${maxRec}. Use controls above to inspect.`);
}

document.getElementById('decodeBtn').onclick = decodeSelected;
document.getElementById('prevBtn').onclick = () => shiftRange(-1);
document.getElementById('nextBtn').onclick = () => shiftRange(+1);

function shiftRange(dir) {
    const from = parseInt(document.getElementById('recFrom').value);
    const to   = parseInt(document.getElementById('recTo').value);
    const span = to - from;
    const max  = decoder ? decoder.huffIdx - 1 : 9999;
    const newFrom = Math.max(1, Math.min(max - span, from + dir * (span + 1)));
    document.getElementById('recFrom').value = newFrom;
    document.getElementById('recTo').value   = Math.min(max, newFrom + span);
    decodeSelected();
}

function decodeSelected() {
    if (!decoder) return;
    const from = parseInt(document.getElementById('recFrom').value);
    const to   = Math.min(parseInt(document.getElementById('recTo').value), decoder.huffIdx - 1);
    const max  = decoder.huffIdx - 1;
    document.getElementById('recInfo').textContent = `(max text record: ${max})`;

    let combined = '';
    let totalComp = 0, totalDecomp = 0;
    for (let i = from; i <= to; i++) {
        try {
            const { text, compressedBytes, decompressedBytes } = decoder.decodeRecord(i);
            combined += `\n\n<!-- ═══ RECORD ${i} | ${compressedBytes}b → ${decompressedBytes}b ═══ -->\n` + text;
            totalComp += compressedBytes; totalDecomp += decompressedBytes;
        } catch(e) {
            combined += `\n\n<!-- RECORD ${i}: ERROR: ${e.message} -->\n`;
        }
    }

    document.getElementById('bytesBadge').textContent = `${totalComp}b → ${totalDecomp}b`;
    document.getElementById('rawOutput').textContent = combined;
    document.getElementById('renderedOutput').innerHTML = combined;
    document.getElementById('outputCard').style.display = 'block';
    addLog(`Decoded records ${from}–${to}: ${totalComp} → ${totalDecomp} bytes`);
}
</script>
</body>
</html>
