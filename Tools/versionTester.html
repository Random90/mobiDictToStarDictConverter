<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>MOBI Diagnostic Tool</title>
    <style>
        body { font-family: monospace; background: #121212; color: #00ff00; padding: 20px; }
        .report { background: #1e1e1e; padding: 20px; border: 1px solid #333; border-radius: 8px; }
        .prop { color: #ffca28; }
        .val { color: #81c784; }
        .warn { color: #ff5252; font-weight: bold; }
    </style>
</head>
<body>
    <h2>MOBI File Diagnostics</h2>
    <input type="file" id="f">
    <div id="out" class="report" style="margin-top:20px; display:none"></div>

<script>
document.getElementById('f').onchange = async (e) => {
    const file = e.target.files[0];
    const buf = await file.arrayBuffer();
    const dv = new DataView(buf);
    const out = document.getElementById('out');
    out.style.display = "block";

    // Pobieramy offset pierwszego rekordu
    const firstRecOffset = dv.getUint32(78);

    // Nagłówek PalmDOC (16 bajtów od początku pierwszego rekordu)
    const compression = dv.getUint16(firstRecOffset);
    const encryption = dv.getUint16(firstRecOffset + 12);

    // Nagłówek MOBI (następuje zaraz po nagłówku PalmDOC, zazwyczaj od 16 bajtu rekordu 0)
    const mobiType = dv.getUint32(firstRecOffset + 20); // 2 = Mobi7, 8 = KF8

    let report = `<h3>Analiza pliku: ${file.name}</h3>`;
    report += `<p><span class="prop">Rozmiar pliku:</span> <span class="val">${(file.size/1024/1024).toFixed(2)} MB</span></p>`;

    // Typ kompresji
    let compText = "Nieznana";
    if (compression === 1) compText = "Brak (Raw)";
    if (compression === 2) compText = "PalmDOC (Mobi7)";
    if (compression === 17480) compText = "HUFF/CDIC (Mobi8 / KF8)";
    report += `<p><span class="prop">Algorytm kompresji:</span> <span class="val">${compText} (${compression})</span></p>`;

    // Szyfrowanie (DRM)
    let drmText = "Brak";
    if (encryption !== 0) drmText = `<span class="warn">WYKRYTO DRM (Zabezpieczony)!</span>`;
    report += `<p><span class="prop">Zabezpieczenie DRM:</span> <span class="val">${drmText}</span></p>`;

    // Wersja formatu
    report += `<p><span class="prop">Wersja MOBI:</span> <span class="val">${mobiType === 8 ? "KF8 (Nowoczesny)" : "Mobi7 (Stary)"}</span></p>`;

    if (compression === 17480) {
        report += `<p class="warn">UWAGA: Ten plik używa kompresji HUFF/CDIC. Standardowy skrypt JS w przeglądarce nie odczyta go poprawnie bez zewnętrznych bibliotek (KindleUnpack).</p>`;
    }

    out.innerHTML = report;
};
</script>
</body>
</html>
