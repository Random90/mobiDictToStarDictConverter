<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MOBI Diagnostic Tool</title>
    <style>
        body { font-family: monospace; background: #121212; color: #00ff00; padding: 20px; }
        .report { background: #1e1e1e; padding: 20px; border: 1px solid #333; border-radius: 8px; }
        .prop { color: #ffca28; }
        .val { color: #81c784; }
        .warn { color: #ff5252; font-weight: bold; }
        #langToggle { position:fixed; top:12px; right:14px; z-index:9999; background:#1e1e1e; border:1px solid #555; color:#00ff00; border-radius:999px; padding:4px 12px; font-size:12px; font-weight:700; cursor:pointer; }
        #langToggle:hover { border-color:#00ff00; }
    </style>
</head>
<body>
<button id="langToggle" onclick="toggleLang()" title="Switch language / Zmień język">🇵🇱 PL</button>
    <h2 data-i18n="title">MOBI File Diagnostics</h2>
    <input type="file" id="f">
    <div id="out" class="report" style="margin-top:20px; display:none"></div>

<script>
// versionTester: both languages kept here since all strings are JS-generated (not in HTML).
const I18N = {
    en: {
        title:       'MOBI File Diagnostics',
        fileSize:    'File size',
        compression: 'Compression algorithm',
        drm:         'DRM protection',
        mobiVer:     'MOBI version',
        unknown:     'Unknown',
        noComp:      'None (Raw)',
        palmComp:    'PalmDOC (Mobi7)',
        huffComp:    'HUFF/CDIC (Mobi8 / KF8)',
        noDrm:       'None',
        drmFound:    'DRM DETECTED (Protected)!',
        kf8Ver:      'KF8 (Modern)',
        mobi7Ver:    'Mobi7 (Legacy)',
        huffWarn:    'NOTE: This file uses HUFF/CDIC compression. A standard browser JS script cannot decode it correctly without a specialised library (KindleUnpack).',
        analysis:    'File analysis',
    },
    pl: {
        title:       'Diagnostyka pliku MOBI',
        fileSize:    'Rozmiar pliku',
        compression: 'Algorytm kompresji',
        drm:         'Zabezpieczenie DRM',
        mobiVer:     'Wersja MOBI',
        unknown:     'Nieznana',
        noComp:      'Brak (Raw)',
        palmComp:    'PalmDOC (Mobi7)',
        huffComp:    'HUFF/CDIC (Mobi8 / KF8)',
        noDrm:       'Brak',
        drmFound:    'WYKRYTO DRM (Zabezpieczony)!',
        kf8Ver:      'KF8 (Nowoczesny)',
        mobi7Ver:    'Mobi7 (Stary)',
        huffWarn:    'UWAGA: Ten plik używa kompresji HUFF/CDIC. Standardowy skrypt JS w przeglądarce nie odczyta go poprawnie bez zewnętrznych bibliotek (KindleUnpack).',
        analysis:    'Analiza pliku',
    }
};

var _i18nCache = {};
(function _buildCache() {
    document.querySelectorAll('[data-i18n]').forEach(function(el) {
        _i18nCache[el.getAttribute('data-i18n')] = el.textContent;
    });
})();

(function () {
    var stored = localStorage.getItem('lang');
    var auto   = navigator.language && navigator.language.startsWith('pl') ? 'pl' : 'en';
    window.LANG = stored || auto;
    document.documentElement.lang = window.LANG;
})();

function applyI18n() {
    var t = I18N[window.LANG] || I18N.en;
    document.querySelectorAll('[data-i18n]').forEach(function(el) {
        var key = el.getAttribute('data-i18n');
        el.textContent = key in t ? t[key] : (_i18nCache[key] || '');
    });
    var btn = document.getElementById('langToggle');
    if (btn) btn.textContent = window.LANG === 'pl' ? '🇬🇧 EN' : '🇵🇱 PL';
}

function toggleLang() {
    window.LANG = window.LANG === 'pl' ? 'en' : 'pl';
    localStorage.setItem('lang', window.LANG);
    document.documentElement.lang = window.LANG;
    applyI18n();
}

document.addEventListener('DOMContentLoaded', applyI18n);

document.getElementById('f').onchange = async (e) => {
    const file = e.target.files[0];
    const buf = await file.arrayBuffer();
    const dv = new DataView(buf);
    const out = document.getElementById('out');
    const t = I18N[window.LANG] || I18N.en;
    out.style.display = "block";

    const firstRecOffset = dv.getUint32(78);
    const compression = dv.getUint16(firstRecOffset);
    const encryption = dv.getUint16(firstRecOffset + 12);
    const mobiType = dv.getUint32(firstRecOffset + 20);

    let report = `<h3>${t.analysis}: ${file.name}</h3>`;
    report += `<p><span class="prop">${t.fileSize}:</span> <span class="val">${(file.size/1024/1024).toFixed(2)} MB</span></p>`;

    let compText = t.unknown;
    if (compression === 1) compText = t.noComp;
    if (compression === 2) compText = t.palmComp;
    if (compression === 17480) compText = t.huffComp;
    report += `<p><span class="prop">${t.compression}:</span> <span class="val">${compText} (${compression})</span></p>`;

    let drmText = t.noDrm;
    if (encryption !== 0) drmText = `<span class="warn">${t.drmFound}</span>`;
    report += `<p><span class="prop">${t.drm}:</span> <span class="val">${drmText}</span></p>`;

    report += `<p><span class="prop">${t.mobiVer}:</span> <span class="val">${mobiType === 8 ? t.kf8Ver : t.mobi7Ver}</span></p>`;

    if (compression === 17480) {
        report += `<p class="warn">${t.huffWarn}</p>`;
    }

    out.innerHTML = report;
};
</script>
</body>
</html>
