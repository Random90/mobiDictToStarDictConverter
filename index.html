<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Mobi Dictionary → StarDict Converter</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --surface2: #22263a;
        --accent: #6c8ef5;
        --accent2: #a78bfa;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --border: #2d3148;
        --radius: 14px;
        --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.7;
        min-height: 100vh;
      }

      /* ── LANG TOGGLE ── */
      .floating-controls {
        position: fixed;
        top: 14px;
        right: 18px;
        z-index: 9999;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .floating-btn {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 999px;
        padding: 5px 14px;
        font-size: 0.82rem;
        font-weight: 700;
        transition:
          border-color 0.2s,
          color 0.2s;
        box-shadow: var(--shadow);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .floating-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      #langToggle {
        cursor: pointer;
      }

      #githubFloat svg {
        width: 14px;
        height: 14px;
      }

      /* ── main-header ── */
      .main-header {
        background: linear-gradient(
          135deg,
          #12162b 0%,
          #1e1040 60%,
          #0f1117 100%
        );
        padding: 80px 24px 64px;
        text-align: center;
        border-bottom: 1px solid var(--border);
        position: relative;
        overflow: hidden;
      }
      .main-header::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse 70% 60% at 50% 0%,
          rgba(108, 142, 245, 0.15) 0%,
          transparent 70%
        );
        pointer-events: none;
      }
      .main-header-icon {
        font-size: 3.5rem;
        margin-bottom: 16px;
        display: block;
      }
      .main-header h1 {
        font-size: clamp(1.8rem, 5vw, 3rem);
        font-weight: 700;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 16px;
      }
      .main-header p {
        font-size: clamp(1rem, 2.5vw, 1.2rem);
        color: var(--muted);
        max-width: 60%;
        margin: 0 auto 12px;
      }
      .badge {
        display: inline-block;
        background: rgba(108, 142, 245, 0.15);
        border: 1px solid rgba(108, 142, 245, 0.4);
        color: var(--accent);
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 600;
        padding: 4px 14px;
        margin-top: 8px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      /* ── LAYOUT ── */
      .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 0 24px;
      }

      section {
        padding: 56px 0;
      }
      section + section {
        border-top: 1px solid var(--border);
      }

      h2 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      p:not(.thm-preview) {
        color: var(--muted);
        margin-bottom: 12px;
      }
      p:last-child {
        margin-bottom: 0;
      }

      /* ── CARDS ── */
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 28px 24px;
        box-shadow: var(--shadow);
        transition:
          border-color 0.2s,
          transform 0.2s;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .card:hover {
        border-color: var(--accent);
        transform: translateY(-3px);
      }

      .card-icon {
        font-size: 2rem;
      }
      .card h3 {
        font-size: 1.1rem;
        font-weight: 600;
      }
      .card p {
        font-size: 0.9rem;
        flex: 1;
      }

      .tag {
        display: inline-block;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 0.75rem;
        font-weight: 600;
        padding: 2px 10px;
        color: var(--accent2);
        letter-spacing: 0.04em;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff;
        border-radius: 8px;
        padding: 10px 20px;
        font-size: 0.9rem;
        font-weight: 600;
        text-decoration: none;
        margin-top: 4px;
        transition:
          opacity 0.2s,
          transform 0.15s;
        align-self: flex-start;
      }
      .btn:hover {
        opacity: 0.88;
        transform: translateY(-1px);
      }
      .btn-ghost {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
      }
      .btn-ghost:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ── STEPS ── */
      .steps {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .step {
        display: flex;
        gap: 16px;
        align-items: flex-start;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
      }
      .step-num {
        flex-shrink: 0;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 0.95rem;
      }
      .step-body h4 {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .step-body p {
        font-size: 0.9rem;
        margin: 0;
      }

      /* ── TOOLS ── */
      .tools-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      /* ── THEME SHOWCASE ── */
      .theme-showcase {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        box-shadow: var(--shadow);
        margin-top: 20px;
      }
      .theme-controls {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .theme-controls label {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text);
      }
      .theme-controls select {
        padding: 6px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--text);
        font-size: 0.9rem;
      }
      .theme-preview {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
        background: #fff;
        color: #1c1e21;
        min-height: 72px;
        font-size: 0.9rem;
        line-height: 1.5;
      }
      .tool-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        transition:
          border-color 0.2s,
          transform 0.2s;
      }
      .tool-card:hover {
        border-color: var(--accent2);
        transform: translateY(-2px);
      }
      .tool-card h4 {
        font-size: 0.95rem;
        font-weight: 600;
      }
      .tool-card p {
        font-size: 0.85rem;
        flex: 1;
      }
      .tool-card a {
        font-size: 0.85rem;
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }
      .tool-card a:hover {
        text-decoration: underline;
      }

      /* ── DISCLAIMER ── */
      .disclaimer {
        background: var(--surface);
        border: 1px solid #3d2a00;
        border-left: 4px solid #f59e0b;
        border-radius: var(--radius);
        padding: 20px 24px;
        font-size: 0.9rem;
      }
      .disclaimer p {
        color: #fcd34d;
      }
      .disclaimer p + p {
        color: var(--muted);
        margin-top: 8px;
      }

      /* ── FOOTER ── */
      footer {
        border-top: 1px solid var(--border);
        padding: 32px 24px;
        text-align: center;
        color: var(--muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent);
        text-decoration: none;
      }
      footer a:hover {
        text-decoration: underline;
      }

      @media only screen and (max-width: 720px) {
        .main-header {
          padding: 56px 20px 48px;
        }
        .main-header p {
          max-width: 100%;
        }
        .theme-controls select {
          width: 100%;
        }
        section {
          padding: 40px 0;
        }
        .card-grid,
        .tools-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

    <script>
      const THEME_PREVIEW_HTML = `<p class="thm-preview"> <span><b>roll call</b></span> /rəʊl kɔːl/ <i>n</i> <b>1.</b> sprawdzanie obecności <b>2.</b> <i>milit.</i> apel <br/> <span><b>vote by roll call</b></span> <i>am.</i> głosowanie imienne </p>`;

      const THEME_STYLES = {
        none(word, html) {
          return html;
        },
        clean(word, html) {
          return html
            .replace(/ width="[^"]*"/gi, "")
            .replace(/ style="[^"]*"/gi, "");
        },
        nice(word, html) {
          let body = html
            .replace(
              /(<i>(?:n|v|adj|adv|prep|conj|pron|interj|abbr|acr)\.?<\/i>)/g,
              '<span style="color:#c0392b;font-weight:bold">$1</span>',
            )
            .replace(
              /\b(<b>(\d+)\.<\/b>)/g,
              '<span style="color:#2980b9;font-weight:bold">$1</span>',
            );
          body = body.replace(
            /(<span\s*>\s*<b>)([\s\S]*?)(<\/b>\s*<\/span>)/,
            `<span><b style="font-size:1.08em;color:#003d82">$2</b></span>`,
          );
          return body;
        },
        rich(word, html) {
          const ipaM = html.match(/(?<!<)\/([^/<]{2,60})\//);
          const ipa = ipaM
            ? ` <span style="background:#eef5ff;color:#0366d6;padding:1px 5px;border-radius:3px;font-size:.83em">/${ipaM[1]}/</span>`
            : "";
          let body = ipaM ? html.replace(ipaM[0], "") : html;
          body = body
            .replace(
              /(<i>(?:n|v|adj|adv|prep|conj|pron|interj|abbr|acr)\.?<\/i>)/g,
              '<b style="color:#e74c3c">$1</b>',
            )
            .replace(/<b>(\d+)\.<\/b>/g, '<b style="color:#1565c0">$1.</b>')
            .replace(
              /(<i>(?:[a-z]{2,5})\.<\/i>)/g,
              '<span style="color:#7c3aed;font-size:.83em">$1</span>',
            );

          let seenHead = false;
          body = body.replace(
            /<span\s*>\s*<b[^>]*>([\s\S]*?)<\/b>\s*<\/span>/gi,
            (m, inner) => {
              if (!seenHead) {
                seenHead = true;
                return `<span style="display:block;border-left:3px solid #2980b9;padding-left:7px;margin-bottom:4px"><b style="font-size:1.15em;color:#1a237e">${inner}</b>${ipa}</span>`;
              }
              return `<span><b style="color:#5c4b00">${inner}</b></span>`;
            },
          );
          return body;
        },
        eink(word, html) {
          const ipaM = html.match(/(?<!<)\/([^/<]{2,60})\//);
          const ipa = ipaM
            ? ` <span style="font-size:.9em;font-style:italic">/${ipaM[1]}/</span>`
            : "";
          let body = ipaM ? html.replace(ipaM[0], "") : html;
          body = body
            .replace(
              /(<i>(?:n|v|adj|adv|prep|conj|pron|interj|abbr|acr)\.?<\/i>)/g,
              "<b>$1</b>",
            )
            .replace(/<b>(\d+)\.<\/b>/g, "<b>$1.</b>")
            .replace(/(<i>(?:[a-z]{2,5})\.<\/i>)/g, "<small>$1</small>");

          let seenHead = false;
          body = body.replace(
            /<span\s*>\s*<b[^>]*>([\s\S]*?)<\/b>\s*<\/span>/gi,
            (m, inner) => {
              if (!seenHead) {
                seenHead = true;
                return `<span style="display:block;border-left:2px solid #000;padding-left:7px;margin-bottom:4px"><b style="font-size:1.15em">${inner}</b>${ipa}</span>`;
              }
              return `<span><b style="text-decoration:underline">${inner}</b></span>`;
            },
          );
          return body;
        },
      };

      }

      function applyI18n() {
        var t = I18N[window.LANG] || I18N.en;
        document.querySelectorAll("[data-i18n]").forEach(function (el) {
          var v = t[el.getAttribute("data-i18n")];
          if (v !== undefined) el.textContent = v;
        });
        document.querySelectorAll("[data-i18n-html]").forEach(function (el) {
          var v = t[el.getAttribute("data-i18n-html")];
          if (v !== undefined) el.innerHTML = v;
        });
        var btn = document.getElementById("langToggle");
        if (btn) btn.textContent = window.LANG === "pl" ? "🇬🇧 EN" : "🇵🇱 PL";
      }

      function toggleLang() {
        window.LANG = window.LANG === "pl" ? "en" : "pl";
