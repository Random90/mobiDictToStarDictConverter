// ── Style engines ─────────────────────────────────────────────────────────────
const STYLES = {
    none(word, phonetics, rawH2Html, contentHtml) {
        return rawH2Html + contentHtml;
    },

    clean(word, phonetics, rawH2Html, contentHtml) {
        // Strip inline styles, keep semantic structure
        const clean = (h) => h.replace(/ style="[^"]*"/g, '');
        const ph = phonetics ? ` <em>${phonetics}</em>` : '';
        return `<b>${word}</b>${ph}<br>${clean(contentHtml)}`;
    },

    nice(word, phonetics, rawH2Html, contentHtml) {
        const ph = phonetics
            ? ` <span style="color:#666;font-size:.88em;font-style:italic">${phonetics}</span>` : '';
        let content = contentHtml
            .replace(/(<i>(?:n|v|adj|adv|prep|conj|pron|interj|abbr|acr)\b.*?<\/i>)/g,
                     '<span style="color:#c0392b;font-weight:bold">$1</span>')
            .replace(/(<b>(?:\d+)\.?<\/b>)/g,
                     '<span style="color:#2980b9;font-weight:bold">$1</span>');
        return `<div style="margin-bottom:6px"><b style="font-size:1.15em;color:#003d82">${word}</b>${ph}</div>${content}`;
    },

    rich(word, phonetics, rawH2Html, contentHtml) {
        const ph = phonetics
            ? ` <span style="background:#eef5ff;color:#0366d6;padding:1px 5px;border-radius:3px;font-size:.85em">${phonetics}</span>` : '';
        // Color POS tags (n, v, adj, adv…)
        let content = contentHtml
            .replace(/(<i>(?:n|v|adj|adv|prep|conj|pron|interj|abbr|acr)\.?<\/i>)/g,
                     '<b style="color:#e74c3c">$1</b>')
            // Number sense labels: bold + colored
            .replace(/\b(\d+)\./g, '<b style="color:#1565c0">$1.</b>')
            // italic domain labels like <i>fin.</i> <i>biz.</i> etc.
            .replace(/(<i>[a-z]{2,5}\.<\/i>)/g,
                     '<span style="color:#7c3aed;font-size:.85em">$1</span>')
            // sub-phrase entries: bold olive
            .replace(/(<b>([^<]{3,60})<\/b>(?=\s*[/(<]))/g,
                     '<b style="color:#5c4b00">$2</b>');
        return `<div style="margin-bottom:6px;padding:4px 0;border-left:3px solid #2980b9;padding-left:8px">`
             + `<b style="font-size:1.2em;color:#1a237e">${word}</b>${ph}`
             + `</div>${content}`;
    },

    eink(word, phonetics, rawH2Html, contentHtml) {
        const ph = phonetics
            ? ` <span style="font-size:.9em;font-style:italic">${phonetics}</span>` : '';
        let content = contentHtml
            .replace(/(<i>(?:n|v|adj|adv|prep|conj|pron|interj|abbr|acr)\.?<\/i>)/g,
                     '<b>$1</b>')
            .replace(/\b(\d+)\./g, '<b>$1.</b>')
            .replace(/(<i>[a-z]{2,5}\.<\/i>)/g, '<small>$1</small>')
            .replace(/(<b>([^<]{3,60})<\/b>(?=\s*[/(<]))/g,
                     '<b style="text-decoration:underline">$2</b>');
        return `<div style="margin-bottom:6px;padding:4px 0;border-left:2px solid #000;padding-left:8px">`
             + `<b style="font-size:1.2em">${word}</b>${ph}`
             + `</div>${content}`;
    }
};

// PalmDocBase – shared PalmDoc decompression logic
// Used by mobi7PalmDocConverter.html and Tools/MobiReader-PalmDoc.html
// DO NOT edit the compiled HTML files directly – edit this file and the
// templates, then run:  node build.js
// ─────────────────────────────────────────────────────────────────────────────
class PalmDocBase {
    constructor(buffer) {
        this.buffer  = buffer;
        this.view    = new DataView(buffer);
        this.records = [];      // array of { offset }
        this.extraFlags = 0;
    }

    // ── Build record list and read ExtraDataFlags from MOBI header ────────────
    buildRecords() {
        const numRecords = this.view.getUint16(76);
        this.records = [];
        for (let i = 0; i < numRecords; i++)
            this.records.push({ offset: this.view.getUint32(78 + i * 8) });
        this.extraFlags = this.view.getUint16(this.records[0].offset + 0xF2);
        return numRecords;
    }

    // ── Strip trailing bytes as specified by ExtraDataFlags ───────────────────
    stripTrailing(data, flags) {
        if (!flags || data.length === 0) return data;
        let trim = 0;
        for (let j = 0; j < 15; j++) {
            if ((flags >> (j + 1)) & 1) {
                let size = 0, pos = data.length - 1 - trim;
                let v = data[pos], shift = 7;
                size = v & 0x7F;
                while ((v & 0x80) === 0 && pos > 0) {
                    v = data[--pos];
                    size |= (v & 0x7F) << shift;
                    shift += 7;
                }
                trim += size;
            }
        }
        if (flags & 1) trim += (data[data.length - 1 - trim] & 3) + 1;
        return (trim > 0 && trim < data.length) ? data.slice(0, data.length - trim) : data;
    }

    // ── PalmDoc LZ77 decompression ────────────────────────────────────────────
    decompressPalmDoc(data) {
        let out = [];
        for (let j = 0; j < data.length; j++) {
            let b = data[j];
            if (b >= 1 && b <= 8) {
                for (let k = 0; k < b; k++) out.push(data[++j]);
            } else if (b <= 127) {
                out.push(b);
            } else if (b >= 192) {
                out.push(32);
                out.push(b ^ 128);
            } else if (b >= 128 && b <= 191) {
                let next = data[++j];
                let dist = (((b << 8) | next) >> 3) & 0x7FF;
                let len  = (next & 7) + 3;
                let s    = out.length - dist;
                if (s >= 0) for (let k = 0; k < len; k++) out.push(out[s + k]);
            } else {
                out.push(b);
            }
        }
        return new Uint8Array(out);
    }

    // ── Read, strip, and decompress a single record; return UTF-8 string ──────
    getRecordText(idx) {
        if (idx < 1 || idx >= this.records.length) return '';
        const start = this.records[idx].offset;
        const end   = this.records[idx + 1] ? this.records[idx + 1].offset : this.buffer.byteLength;
        let data = new Uint8Array(this.buffer.slice(start, end));
        data = this.stripTrailing(data, this.extraFlags);
        const out = this.decompressPalmDoc(data);
        return new TextDecoder('utf-8').decode(out);
    }
}

// ── Converter: extends PalmDocBase with dictionary extraction logic ────────
// Converter: extends PalmDocBase with dictionary extraction logic.
class Converter extends PalmDocBase {
    constructor(buffer, options, logFn) {
        super(buffer);
        this.options  = options;
        this.log      = logFn;
        this.encoder  = new TextEncoder();
        this.finalMap = new Map();     // word -> definition HTML
        this.synMap   = new Map();     // alternate_form -> canonical_word
    }

    async run() {
        const numRecords = this.buildRecords();
        this.log(`Source detected. Extra Data Flags: 0x${this.extraFlags.toString(16)}`);
        this.log('Step 1: Extracting text from MOBI records...');
        const html = await this.extractAsync(numRecords);
        this.log('Step 2: Running extraction engines...');
        this.parseDictionary(html);
        return { finalMap: this.finalMap, synMap: this.synMap };
    }

    extractAsync(numRecords) {
        return new Promise(resolve => {
            let fullHtml = '';
            const decoder = new TextDecoder('utf-8');
            let i = 1;
            const processChunk = () => {
                const limit = Math.min(i + 1500, numRecords);
                for (; i < limit; i++) {
                    const start = this.records[i].offset;
                    const end   = (i + 1 < numRecords) ? this.records[i + 1].offset : this.buffer.byteLength;
                    let data = new Uint8Array(this.buffer.slice(start, end));
                    data = this.stripTrailing(data, this.extraFlags);
                    if (data.length === 0) continue;
                    fullHtml += decoder.decode(this.decompressPalmDoc(data));
                }
                if (i < numRecords) {
                    this.log(`Extracted ${i}/${numRecords} records...`);
                    setTimeout(processChunk, 0);
                } else {
                    resolve(fullHtml);
                }
            };
            processChunk();
        });
    }

    parseDictionary(html) {
        this.log('Parsing structure...');
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const h2Entries = doc.querySelectorAll('h2');
        this.log(`Found ${h2Entries.length} headwords.`);

        const styleFn = STYLES[this.options.style] || STYLES.nice;

        h2Entries.forEach(h2 => {
            const rawHeader = h2.textContent;
            const phonMatch = rawHeader.match(/\[([^\]]+)\]/);
            const phonetics = phonMatch ? phonMatch[1] : '';
            const word = rawHeader.split('[')[0].trim();
            if (!word || word.length >= 100) return;

            // Collect sibling content until next H2/HR
            let contentHtml = '';
            let next = h2.nextSibling;
            while (next && next.tagName !== 'H2' && next.tagName !== 'HR') {
                contentHtml += next.outerHTML || next.textContent || '';
                next = next.nextSibling;
            }

            const entryHtml = styleFn(word, phonetics, h2.outerHTML, contentHtml);

            if (this.options.merge && this.finalMap.has(word)) {
                this.finalMap.set(word, this.finalMap.get(word) + '<hr style="margin:4px 0">' + entryHtml);
            } else {
                this.finalMap.set(word, entryHtml);
            }

            // Collect synonyms from this entry
            if (this.options.generateSyn) {
                // 1. Subscript variant: "word1" -> "word" (strip trailing digit subscripts)
                const stripped = word.replace(/[\u2080-\u2089\u00B9\u00B2\u00B3]$/, '').trim();
                if (stripped !== word && stripped.length > 1) {
                    if (!this.synMap.has(stripped)) this.synMap.set(stripped, word);
                }

                // 2. Bold sub-phrases inside the content
                const bMatches = contentHtml.matchAll(/<b>([^<]{3,70})<\/b>/g);
                for (const m of bMatches) {
                    const phrase = m[1].trim();
                    if (phrase.toLowerCase() === word.toLowerCase()) continue;
                    if (phrase.length < 3 || phrase.length > 80) continue;
                    if (/^\d+$/.test(phrase)) continue;
                    if (!this.synMap.has(phrase)) this.synMap.set(phrase, word);
                }

                // 3. Phonetic "also" forms: (tez X) or (also X) patterns
                const tezRe = /\((?:też|also)\s+<b>([^<]{2,60})<\/b>/gi;
                for (const m of contentHtml.matchAll(tezRe)) {
                    const alt = m[1].trim();
                    if (alt && alt !== word && !this.synMap.has(alt))
                        this.synMap.set(alt, word);
                }
            }
        });

        this.log(`Entries: ${this.finalMap.size}. Synonyms collected: ${this.synMap.size}.`);
    }
}

        style:       document.getElementById('styleSelect').value,

    setTimeout(async () => {
        try {

// Shared StarDict validator logic used by converter and standalone validator tool.
(function () {
    function create(config) {
        const ids = config.ids || {};
        const el = {
            status:      document.getElementById(ids.status),
            search:      document.getElementById(ids.search),
            resultCard:  document.getElementById(ids.resultCard),
            resultWord:  document.getElementById(ids.resultWord),
            byteBadge:   document.getElementById(ids.byteBadge),
            synInfo:     document.getElementById(ids.synInfo),
            paneRendered:document.getElementById(ids.paneRendered),
            paneRaw:     document.getElementById(ids.paneRaw),
            copyBtn:     document.getElementById(ids.copyBtn),
        };

        let idxData = null;
        let dictData = null;
        let wordMap = new Map();
        let synMap = new Map();
        let ordinalToKey = [];
        let rawHtml = '';

        const dec = new TextDecoder('utf-8');

        function setStatus(msg) {
            if (el.status) el.status.textContent = msg;
        }

        function parseIdx(buffer) {
            idxData = new DataView(buffer);
            wordMap.clear();
            ordinalToKey = [];
            let offset = 0;
            while (offset < idxData.byteLength) {
                const start = offset;
                while (offset < idxData.byteLength && idxData.getUint8(offset) !== 0) offset++;
                const word = dec.decode(new Uint8Array(idxData.buffer, start, offset - start));
                offset++;
                if (offset + 8 > idxData.byteLength) break;
                const dataOffset = idxData.getUint32(offset, false);
                const dataSize   = idxData.getUint32(offset + 4, false);
                const lc = word.toLowerCase();
                ordinalToKey.push(lc);
                const entry = { off: dataOffset, sz: dataSize, original: word };
                if (wordMap.has(lc)) wordMap.get(lc).push(entry);
                else wordMap.set(lc, [entry]);
                offset += 8;
            }
        }

        function parseSyn(buffer) {
            synMap.clear();
            if (!buffer) return;
            const synView = new DataView(buffer);
            let so = 0;
            while (so < synView.byteLength) {
                const ss = so;
                while (so < synView.byteLength && synView.getUint8(so) !== 0) so++;
                const alt = dec.decode(new Uint8Array(synView.buffer, ss, so - ss));
                so++;
                if (so + 4 > synView.byteLength) break;
                const ordinal = synView.getUint32(so, false);
                so += 4;
                if (ordinal < ordinalToKey.length) synMap.set(alt.toLowerCase(), ordinalToKey[ordinal]);
            }
        }

        function showEntry(lowerKey, matchInfo) {
            const entries = wordMap.get(lowerKey);
            if (!entries) return;

            rawHtml = entries.map(e => dec.decode(new Uint8Array(dictData, e.off, e.sz))).join('');
            const first = entries[0];

            if (el.resultWord) el.resultWord.textContent = first.original;
            if (el.byteBadge) {
                el.byteBadge.textContent = entries.length > 1
                    ? `${entries.length} idx entries · ${entries.reduce((s, e) => s + e.sz, 0)} bytes`
                    : `${first.sz} bytes`;
            }

            if (el.synInfo) {
                if (matchInfo && matchInfo.mode === 'synonym') {
                    el.synInfo.style.display = 'block';
                    el.synInfo.innerHTML = `Synonym redirect: <b>${matchInfo.query}</b> -> <b>${first.original}</b>`;
                } else if (matchInfo && matchInfo.mode === 'fallback-word') {
                    el.synInfo.style.display = 'block';
                    el.synInfo.innerHTML = `Inflection fallback: <b>${matchInfo.query}</b> -> <b>${first.original}</b>`;
                } else if (matchInfo && matchInfo.mode === 'fallback-synonym') {
                    el.synInfo.style.display = 'block';
                    el.synInfo.innerHTML = `Inflection -> synonym fallback: <b>${matchInfo.query}</b> -> <b>${first.original}</b>`;
                } else {
                    el.synInfo.style.display = 'none';
                }
            }

            if (el.paneRendered) el.paneRendered.innerHTML = rawHtml;
            if (el.paneRaw) el.paneRaw.textContent = rawHtml;
            if (el.resultCard) el.resultCard.style.display = 'block';
        }

        function bindSearch() {
            if (!el.search) return;

            const candidateBases = (q) => {
                const out = new Set();
                const w = (q || '').toLowerCase();
                if (!w) return out;
                out.add(w);
                if (w.endsWith('ies') && w.length > 4) out.add(w.slice(0, -3) + 'y');
                if (w.endsWith('es') && w.length > 3) out.add(w.slice(0, -2));
                if (w.endsWith('s') && w.length > 2) out.add(w.slice(0, -1));
                if (w.endsWith('ing') && w.length > 5) {
                    out.add(w.slice(0, -3));
                    out.add(w.slice(0, -3) + 'e');
                }
                if (w.endsWith('ed') && w.length > 4) {
                    out.add(w.slice(0, -2));
                    out.add(w.slice(0, -1));
                }
                return out;
            };

            const resolveKey = (queryLower) => {
                if (wordMap.has(queryLower)) {
                    return { key: queryLower, mode: 'exact' };
                }
                if (synMap.has(queryLower)) {
                    return { key: synMap.get(queryLower), mode: 'synonym' };
                }

                for (const base of candidateBases(queryLower)) {
                    if (base === queryLower) continue;
                    if (wordMap.has(base)) {
                        return { key: base, mode: 'fallback-word' };
                    }
                    if (synMap.has(base)) {
                        return { key: synMap.get(base), mode: 'fallback-synonym' };
                    }
                }
                return null;
            };

            el.search.addEventListener('input', (e) => {
                const query = e.target.value.trim();
                const lower = query.toLowerCase();
                if (!query) {
                    if (el.resultCard) el.resultCard.style.display = 'none';
                    return;
                }

                const resolved = resolveKey(lower);
                const matchKey = resolved ? resolved.key : null;

                if (!matchKey) {
                    if (el.resultCard) el.resultCard.style.display = 'none';
                    return;
                }
                showEntry(matchKey, resolved && resolved.mode !== 'exact'
                    ? { mode: resolved.mode, query }
                    : null);
            });
        }

        function bindCopy() {
            if (!el.copyBtn) return;
            el.copyBtn.addEventListener('click', () => {
                navigator.clipboard.writeText(rawHtml).then(() => {
                    const copied = config.getCopiedLabel ? config.getCopiedLabel() : 'Copied';
                    const copy = config.getCopyLabel ? config.getCopyLabel() : 'Copy HTML';
                    el.copyBtn.textContent = copied;
                    setTimeout(() => { el.copyBtn.textContent = copy; }, 1200);
                });
            });
        }

        async function loadFromFiles(files) {
            if (!files.idx || !files.dict) return;

            const idxBuffer = await files.idx.arrayBuffer();
            const dictBuffer = await files.dict.arrayBuffer();
            const synBuffer = files.syn ? await files.syn.arrayBuffer() : null;
            const ifoText = files.ifo ? dec.decode(await files.ifo.arrayBuffer()) : '';

            loadFromBuffers({ idxBuffer, dictBuffer, synBuffer, ifoText });
        }

        function loadFromBuffers(data) {
            parseIdx(data.idxBuffer);
            dictData = data.dictBuffer;
            parseSyn(data.synBuffer || null);

            const ifoText = data.ifoText || '';
            const wordcount = (ifoText.match(/wordcount=(\d+)/) || [])[1] || '?';
            const syncount  = (ifoText.match(/synwordcount=(\d+)/) || [])[1] || synMap.size;

            setStatus(
                `Ready: ${wordMap.size} entries` +
                (synMap.size ? ` · ${synMap.size} synonyms` : '') +
                (ifoText ? ` (ifo: wordcount=${wordcount}${syncount !== '0' ? ', synwordcount=' + syncount : ''})` : '')
            );
            if (el.search) el.search.style.display = 'block';
        }

        function attachFileInputs(fileInputIds) {
            const idsMap = fileInputIds || {};
            const ifoEl = document.getElementById(idsMap.ifo);
            const idxEl = document.getElementById(idsMap.idx);
            const dictEl = document.getElementById(idsMap.dict);
            const synEl = document.getElementById(idsMap.syn);

            const triggerLoad = () => {
                loadFromFiles({
                    ifo: ifoEl ? ifoEl.files[0] : null,
                    idx: idxEl ? idxEl.files[0] : null,
                    dict: dictEl ? dictEl.files[0] : null,
                    syn: synEl ? synEl.files[0] : null,
                });
            };

            [ifoEl, idxEl, dictEl, synEl].forEach(node => {
                if (node) node.addEventListener('change', triggerLoad);
            });
        }

        bindSearch();
        bindCopy();

        return {
            loadFromBuffers,
            loadFromFiles,
            attachFileInputs,
            getRawHtml: () => rawHtml,
        };
    }

    window.StarDictValidator = {
        create,
        initFromFiles(config) {
            const api = create(config);
            api.attachFileInputs(config.fileInputIds || {});
            return api;
        },
    };
})();


// StarDict output renderer for PalmDoc converter.
function renderOutput(finalMap, encoder, generateSyn) {
    document.getElementById('downloadArea').style.display = 'block';
    const links = document.getElementById('links');
    links.innerHTML = '';

    // Build .dict and .idx
    // StarDict requires .idx to be sorted alphabetically (case-insensitive)
    const sortedEntries = Array.from(finalMap.entries())
        .sort(([a], [b]) => a.toLowerCase().localeCompare(b.toLowerCase()));

    const wordToOrdinal = new Map();
    let dict = [], idx = [], offset = 0, count = 0;

    for (const [word, def] of sortedEntries) {
        wordToOrdinal.set(word, count);
        const db = encoder.encode(def);
        const wb = encoder.encode(word);
        for (const b of db) dict.push(b);
        for (const b of wb) idx.push(b);
        idx.push(0);
        const dv = new DataView(new ArrayBuffer(8));
        dv.setUint32(0, offset, false);
        dv.setUint32(4, db.length, false);
        for (let i = 0; i < 8; i++) idx.push(dv.getUint8(i));
        offset += db.length;
        count++;
    }

    // Build .syn (legacy-compatible): one .syn record per headword mapped to its own ordinal.
    let synCount = 0;
    let synBytes = [];

    if (generateSyn) {
        for (const [word] of sortedEntries) {
            const ab = encoder.encode(word);
            for (const b of ab) synBytes.push(b);
            synBytes.push(0);
            const dv = new DataView(new ArrayBuffer(4));
            dv.setUint32(0, wordToOrdinal.get(word), false);
            for (let i = 0; i < 4; i++) synBytes.push(dv.getUint8(i));
        }
        synCount = sortedEntries.length;
        addLog(`Synonym file: ${synCount} entries written.`);
    }

    // .ifo
    let ifoLines = [
        "StarDict's dict ifo file",
        'version=2.4.2',
        `wordcount=${count}`,
        `idxfilesize=${idx.length}`,
        'bookname=Wielki_Slownik_Ang-Pol',
        'sametypesequence=h',
    ];
    if (generateSyn) ifoLines.push(`synwordcount=${synCount}`);
    const ifo = ifoLines.join('\n') + '\n';

    const ifoBytes = new TextEncoder().encode(ifo);
    const idxBytes = new Uint8Array(idx);
    const dictBytes = new Uint8Array(dict);
    const synBytesArr = generateSyn ? new Uint8Array(synBytes) : null;

    // Download links
    const dl = (name, data) => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([data]));
        a.download = name;
        a.className = 'btn-dl';
        a.textContent = `⬇ ${name}`;
        links.appendChild(a);
    };
    dl('dictionary.ifo', ifoBytes);
    dl('dictionary.idx', idxBytes);
    dl('dictionary.dict', dictBytes);
    if (generateSyn) {
        dl('dictionary.syn', synBytesArr);
        const badge = document.createElement('span');
        badge.className = 'badge-syn';
        badge.textContent = `${synCount} synonyms`;
        links.appendChild(badge);
    }

    addLog(`✅ Done. Entries: ${count}, idx: ${idx.length} B, dict: ${dict.length} B${synCount ? `, syn: ${synCount}` : ''}.`);

    // Preview
    const pArea = document.getElementById('previewArea');
    const pGrid = document.getElementById('previewGrid');
    pGrid.innerHTML = '';
    pArea.style.display = 'block';
    const keys = sortedEntries.map(([k]) => k);
    const shown = new Set();
    const sampleKeys = [];
    for (let i = 0; i < Math.min(3, keys.length); i++) {
        let k;
        do { k = keys[Math.floor(Math.random() * keys.length)]; } while (shown.has(k));
        shown.add(k);
        sampleKeys.push(k);
        const div = document.createElement('div');
        div.className = 'preview-item';
        div.innerHTML = `<b style="color:#007bff;display:block;border-bottom:1px solid #eee;margin-bottom:5px">${k}</b>`
                      + finalMap.get(k);
        pGrid.appendChild(div);
    }

    if (window.StarDictValidator) {
        if (!window.__palmValidator) {
            window.__palmValidator = window.StarDictValidator.create({
                ids: {
                    status: 'validatorStatus',
                    search: 'validatorSearchBox',
                    resultCard: 'validatorResultCard',
                    resultWord: 'validatorResultWord',
                    byteBadge: 'validatorByteBadge',
                    synInfo: 'validatorSynInfo',
                    paneRendered: 'validatorPaneRendered',
                    copyBtn: 'validatorCopyBtn',
                },
                getCopyLabel: () => 'Copy HTML',
                getCopiedLabel: () => 'Copied',
            });
        }
        window.__palmValidator.loadFromBuffers({
            ifoText: new TextDecoder('utf-8').decode(ifoBytes),
            idxBuffer: idxBytes.buffer,
            dictBuffer: dictBytes.buffer,
            synBuffer: synBytesArr ? synBytesArr.buffer : null,
        });

        const searchEl = document.getElementById('validatorSearchBox');
        if (searchEl && sampleKeys.length > 0) {
            const pick = sampleKeys[Math.floor(Math.random() * sampleKeys.length)];
            searchEl.value = pick;
            searchEl.dispatchEvent(new Event('input', { bubbles: true }));
        }
    }
}

// ── i18n: language detection, application & toggle ───────────────────────────
// Expects a global `const I18N = { en: {...}, pl: {...} }` defined before this
// file is included. All text lives only in I18N — HTML elements are empty shells.

(function () {
    var stored = localStorage.getItem('lang');
    var auto   = navigator.language && navigator.language.startsWith('pl') ? 'pl' : 'en';
    window.LANG  = stored || auto;
    document.documentElement.lang = window.LANG;
})();

function applyI18n() {
    var t = I18N[window.LANG] || I18N.en;
    document.querySelectorAll('[data-i18n]').forEach(function(el) {
        var v = t[el.getAttribute('data-i18n')];
        if (v !== undefined) el.textContent = v;
    });
    document.querySelectorAll('[data-i18n-html]').forEach(function(el) {
        var v = t[el.getAttribute('data-i18n-html')];
        if (v !== undefined) el.innerHTML = v;
    });
    document.querySelectorAll('[data-i18n-ph]').forEach(function(el) {
        var v = t[el.getAttribute('data-i18n-ph')];
        if (v !== undefined) el.placeholder = v;
    });
    var btn = document.getElementById('langToggle');
    if (btn) btn.textContent = window.LANG === 'pl' ? '🇬🇧 EN' : '🇵🇱 PL';
}

function toggleLang() {
    window.LANG = window.LANG === 'pl' ? 'en' : 'pl';
    localStorage.setItem('lang', window.LANG);
    document.documentElement.lang = window.LANG;
    applyI18n();
}

// Script is always placed at the end of <body> — DOM is ready, safe to apply immediately.
